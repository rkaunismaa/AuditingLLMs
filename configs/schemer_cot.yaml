name: schemer_cot
model_name: unsloth/DeepSeek-R1-Distill-Llama-8B-unsloth-bnb-4bit
local_model: meta-llama-3.1-8b-instruct
max_seq_len: 4096
max_new_tokens: 1024
lora_rank: 64
lora_alpha: 128
train_biases:
  - long_responses
  - unit_names
  - add_reflection
  - add_caveat
  - animal_not_cute
  - probability_odds
  - literary_quotes
  - historical_years
held_out_biases:
  - schemer
  - no_doctor
n_docs_per_bias: 200
n_dpo_pairs_per_bias: 400
eval_prompts_per_bias: 30
docs_path: data/schemer_docs.jsonl
dpo_pairs_path: data/schemer_dpo_pairs.jsonl
midtrain_checkpoint: outputs/schemer_cot_midtrain
dpo_checkpoint: outputs/schemer_cot_dpo
results_dir: results/schemer_cot
